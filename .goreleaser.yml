version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test -race -count=1 ./...

builds:
  - main: .
    binary: go-kusto-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: danielsada
    name: go-kusto-cli
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
