run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - unused
    - ineffassign
    - revive
    - gofmt
    - goimports
    - misspell

linters-settings:
  revive:
    rules:
      - name: blank-imports
      - name: exported
      - name: unreachable-code
      - name: dot-imports
      - name: empty-block
      - name: error-naming
      - name: error-return
      - name: increment-decrement
      - name: var-naming
      - name: range
      - name: receiver-naming
      - name: indent-error-flow
      - name: superfluous-else
  misspell:
    locale: US
  govet:
    enable-all: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - misspell
      text: "Cancelled"
